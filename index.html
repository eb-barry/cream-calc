<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專業熟齡面霜配方實驗室 - AI 智能分析版</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #3498db; --primary-dark: #2980b9;
            --success: #2ecc71; --danger: #e74c3c; --warning: #f39c12; --ai-color: #8e44ad; --ai-dark: #732d91;
            --bg-color: #f4f7f9; --text-color: #333;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); padding: 20px; color: var(--text-color); margin: 0; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        h2 { text-align: center; color: #2c3e50; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f8f9fa; padding: 20px; border-radius: 12px; border: 1px solid #dee2e6; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; font-size: 13px; color: #555; }
        input[type="number"], select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; transition: 0.3s; font-family: inherit; }
        input[type="number"]:focus, select:focus { border-color: var(--primary); outline: none; }
        
        .status-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; background: #eee; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
        .percent-tracker { font-size: 18px; font-weight: bold; }
        .percent-tracker.match { color: var(--success); }
        .percent-tracker.error { color: var(--danger); }
        
        .action-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-action { background-color: var(--primary); color: white; border: none; padding: 10px 15px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn-action:hover { background-color: var(--primary-dark); }
        .btn-qs { background-color: var(--warning); color: #fff; }
        .btn-qs:hover { background-color: #d68910; }
        .btn-export { background-color: #34495e; }
        .btn-export:hover { background-color: #2c3e50; }
        .btn-ai { background-color: var(--ai-color); box-shadow: 0 4px 10px rgba(142, 68, 173, 0.3); }
        .btn-ai:hover { background-color: var(--ai-dark); }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #2c3e50; color: white; padding: 12px; font-size: 14px; white-space: nowrap; }
        td { border: 1px solid #e0e0e0; padding: 8px; text-align: center; vertical-align: middle; }
        tr:nth-child(even) { background-color: #fdfdfd; }
        
        .cell-input { width: 90%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-size: 14px; font-family: inherit; }
        .cell-input.name-input { text-align: left; width: 95%; }
        .calc-result { font-weight: bold; color: #2c3e50; }
        .highlight-input { color: var(--primary); font-weight: bold; background-color: #eaf2f8; padding: 6px; border-radius: 4px; display: inline-block; width: 100%; box-sizing: border-box; }
        
        .btn-delete { background: var(--danger); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        .btn-delete:hover { background: #c0392b; }
        .btn-add { background: var(--success); margin-top: 15px; width: 100%; padding: 12px; font-size: 16px; }
        .btn-add:hover { background: #27ae60; }

        .summary-card { background: #e8f4fd; border-left: 6px solid var(--primary); padding: 15px; margin-top: 20px; border-radius: 4px; font-size: 14px; line-height: 1.6; }

        /* ======== AI 面板樣式 ======== */
        .ai-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .ai-modal-content { background: white; width: 90%; max-width: 800px; max-height: 85vh; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; animation: slideIn 0.3s ease-out; }
        .ai-header { background: linear-gradient(135deg, var(--ai-color), var(--ai-dark)); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .ai-header h3 { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .ai-close-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .ai-body { padding: 20px; overflow-y: auto; flex-grow: 1; font-size: 15px; line-height: 1.7; color: #333; }
        .ai-body h3 { color: var(--ai-color); border-bottom: 1px solid #eee; padding-bottom: 8px; margin-top: 20px; }
        .ai-body strong { color: #2c3e50; }
        .ai-loading { text-align: center; padding: 40px; color: var(--ai-color); font-weight: bold; font-size: 18px; }
        .ai-spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(142,68,173,0.3); border-radius: 50%; border-top-color: var(--ai-color); animation: spin 1s ease-in-out infinite; margin-bottom: 15px; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* ======== 匯出模式樣式 ======== */
        .exporting .action-group, .exporting .btn-add, .exporting .btn-delete { display: none !important; }
        .exporting th:last-child, .exporting td:last-child { display: none !important; }
        .exporting .container { box-shadow: none; border: 2px solid #2c3e50; }
    </style>
</head>
<body>

<div class="container" id="reportContainer">
    <h2>🧪 專業熟齡面霜 - 實驗室配方定稿紀錄表</h2>
    
    <div class="control-panel">
        <div class="input-box">
            <label>📂 預設配方載入 (選擇後可自由修改)</label>
            <select id="presetType" onchange="loadPreset()">
                <option value="light">清爽型 (夏日/結構優化)</option>
                <option value="moist">滋潤型 (冬日/修復強化)</option>
                <option value="custom">自定義類型 (特殊機能)</option>
            </select>
        </div>
        <div class="input-box">
            <label>⚖️ 預計成品總量 (g)</label>
            <input type="number" id="totalWeight" value="100" min="1" oninput="calculate()">
        </div>
        <div class="input-box">
            <label>🌿 投入藥材總重 (g)</label>
            <input type="number" id="herbWeight" value="10" step="0.1" oninput="calculate()">
        </div>
        <div class="input-box">
            <label>🧽 藥材吸附比 (每g吸油量)</label>
            <input type="number" id="lossRate" value="1.55" step="0.01" oninput="calculate()">
        </div>
    </div>

    <div class="status-bar">
        <div id="percentTracker" class="percent-tracker match">總比例：100.00%</div>
        <div class="action-group">
            <button class="btn-action btn-qs" onclick="autoAdjustBase()" title="將差額自動算入第一項原料(通常是水/純露)">💧 自動補水(Q.S.)</button>
            <button class="btn-action btn-ai" onclick="openAIAdvisor()">✨ Gemini 智能配方分析</button>
            <button class="btn-action btn-export" onclick="exportReport('jpg')">📥 匯出 JPG</button>
            <button class="btn-action btn-export" onclick="exportReport('pdf')">📄 匯出 PDF</button>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th width="20%">原料 INCI / 名稱</th>
                    <th width="12%">配方比例 (%)</th>
                    <th width="12%">比重 (g/ml)</th>
                    <th width="10%">浸泡油標記<br><small>(計算損耗用)</small></th>
                    <th width="12%">淨重需求 (g)</th>
                    <th width="14%">🔧 實際投料 (g)</th>
                    <th width="12%">容量參考 (ml)</th>
                    <th width="8%">操作</th>
                </tr>
            </thead>
            <tbody id="formulaBody">
                <!-- 動態生成內容 -->
            </tbody>
        </table>
    </div>

    <button class="btn-action btn-add" onclick="addIngredient()">➕ 新增配方原料</button>

    <div class="summary-card" id="summary">
        <!-- 摘要自動生成 -->
    </div>
</div>

<!-- AI 顧問視窗 -->
<div class="ai-modal-overlay" id="aiModal">
    <div class="ai-modal-content">
        <div class="ai-header">
            <h3>✨ Gemini 實驗室配方顧問分析</h3>
            <button class="ai-close-btn" onclick="closeAIAdvisor()">&times;</button>
        </div>
        <div class="ai-body" id="aiResultBody">
            <div class="ai-loading">
                <div class="ai-spinner"></div>
                <div>正在將配方傳送至 Gemini AI 進行深度化學分析...<br><small style="font-weight:normal; color:#666; font-size:13px; margin-top:10px; display:block;">請稍候，這可能需要幾秒鐘的時間</small></div>
            </div>
        </div>
    </div>
</div>

<script>
const presets = {
    light: [
        { name: "玫瑰純露 (水相基底)", percent: 71.8, density: 1.00, isHerbOil: false },
        { name: "甘油", percent: 2.0, density: 1.26, isHerbOil: false },
        { name: "1,3-丙二醇", percent: 3.0, density: 1.05, isHerbOil: false },
        { name: "菸鹼醯胺 (B3)", percent: 2.5, density: 1.40, isHerbOil: false },
        { name: "泛醇 (維生素 B5)", percent: 1.0, density: 1.20, isHerbOil: false },
        { name: "中藥浸泡荷荷芭油", percent: 10.0, density: 0.86, isHerbOil: true },
        { name: "角鯊烷 (Squalane)", percent: 4.0, density: 0.81, isHerbOil: false },
        { name: "橄欖乳化蠟", percent: 3.5, density: 0.91, isHerbOil: false },
        { name: "大豆卵磷脂", percent: 0.8, density: 1.03, isHerbOil: false },
        { name: "維他命 E", percent: 0.7, density: 0.95, isHerbOil: false },
        { name: "苯氧乙醇 (防腐)", percent: 0.6, density: 1.10, isHerbOil: false },
        { name: "玫瑰精油", percent: 0.1, density: 0.87, isHerbOil: false }
    ],
    moist: [
        { name: "玫瑰純露 (水相基底)", percent: 68.7, density: 1.00, isHerbOil: false },
        { name: "甘油", percent: 2.0, density: 1.26, isHerbOil: false },
        { name: "1,3-丙二醇", percent: 3.0, density: 1.05, isHerbOil: false },
        { name: "菸鹼醯胺 (B3)", percent: 2.5, density: 1.40, isHerbOil: false },
        { name: "泛醇 (維生素 B5)", percent: 1.0, density: 1.20, isHerbOil: false },
        { name: "中藥浸泡荷荷芭油", percent: 10.0, density: 0.86, isHerbOil: true },
        { name: "角鯊烷 (Squalane)", percent: 5.0, density: 0.81, isHerbOil: false },
        { name: "橄欖乳化蠟", percent: 5.0, density: 0.91, isHerbOil: false },
        { name: "大豆卵磷脂", percent: 1.0, density: 1.03, isHerbOil: false },
        { name: "維他命 E", percent: 1.0, density: 0.95, isHerbOil: false },
        { name: "苯氧乙醇 (防腐)", percent: 0.6, density: 1.10, isHerbOil: false },
        { name: "玫瑰精油", percent: 0.2, density: 0.87, isHerbOil: false }
    ],
    custom: [
        { name: "純水/純露", percent: 70.0, density: 1.00, isHerbOil: false },
        { name: "基礎油脂", percent: 15.0, density: 0.90, isHerbOil: false },
        { name: "乳化劑", percent: 4.0, density: 0.95, isHerbOil: false }
    ]
};

let currentFormula = [];
let currentTotalPercent = 0; // 用於儲存當前計算的總百分比

window.onload = () => {
    document.getElementById('presetType').value = 'light';
    loadPreset();
};

function loadPreset() {
    const type = document.getElementById('presetType').value;
    if (presets[type]) {
        currentFormula = JSON.parse(JSON.stringify(presets[type]));
        renderTable();
    }
}

function addIngredient() { currentFormula.push({ name: "新原料", percent: 0, density: 1.00, isHerbOil: false }); renderTable(); }
function removeIngredient(index) { currentFormula.splice(index, 1); renderTable(); }

function updateData(index, field, value) {
    if (field === 'isHerbOil') { currentFormula[index][field] = value; } 
    else if (field === 'name') { currentFormula[index][field] = value; } 
    else { currentFormula[index][field] = parseFloat(value) || 0; }
    calculate();
}

function autoAdjustBase() {
    if (currentFormula.length === 0) return;
    let totalOther = 0;
    for (let i = 1; i < currentFormula.length; i++) { totalOther += currentFormula[i].percent; }
    if (totalOther > 100) { alert("其他原料比例已超過 100%，無法自動補水，請先調降其他原料！"); return; }
    currentFormula[0].percent = parseFloat((100 - totalOther).toFixed(2));
    renderTable();
}

function renderTable() {
    const tbody = document.getElementById('formulaBody');
    tbody.innerHTML = '';
    currentFormula.forEach((item, index) => {
        tbody.innerHTML += `
            <tr>
                <td><input type="text" class="cell-input name-input" value="${item.name}" oninput="updateData(${index}, 'name', this.value)"></td>
                <td><input type="number" class="cell-input" value="${item.percent}" step="0.1" min="0" oninput="updateData(${index}, 'percent', this.value)"></td>
                <td><input type="number" class="cell-input" value="${item.density}" step="0.01" min="0.1" oninput="updateData(${index}, 'density', this.value)"></td>
                <td><input type="checkbox" ${item.isHerbOil ? 'checked' : ''} onchange="updateData(${index}, 'isHerbOil', this.checked)"></td>
                <td class="calc-result" id="net_${index}">0.00</td>
                <td><div class="highlight-input" id="input_${index}">0.00</div></td>
                <td class="calc-result" id="vol_${index}">0.00</td>
                <td><button class="btn-delete" onclick="removeIngredient(${index})">🗑️</button></td>
            </tr>
        `;
    });
    calculate();
}

function calculate() {
    const totalW = parseFloat(document.getElementById('totalWeight').value) || 0;
    const herbW = parseFloat(document.getElementById('herbWeight').value) || 0;
    const rate = parseFloat(document.getElementById('lossRate').value) || 0;
    
    document.getElementById('totalWeight').setAttribute('value', totalW);
    document.getElementById('herbWeight').setAttribute('value', herbW);
    document.getElementById('lossRate').setAttribute('value', rate);

    const lossWeight = herbW * rate;
    currentTotalPercent = 0;
    let herbOilsNames = [];

    currentFormula.forEach((item, index) => {
        currentTotalPercent += item.percent;
        const netW = totalW * (item.percent / 100);
        let inputW = netW;
        if (item.isHerbOil) { inputW = netW + lossWeight; herbOilsNames.push(item.name); }
        const vol = item.density > 0 ? (inputW / item.density) : 0;

        const elNet = document.getElementById(`net_${index}`);
        const elInput = document.getElementById(`input_${index}`);
        const elVol = document.getElementById(`vol_${index}`);
        if (elNet) elNet.innerText = netW.toFixed(2);
        if (elInput) elInput.innerText = inputW.toFixed(2);
        if (elVol) elVol.innerText = vol.toFixed(2);
    });

    const tracker = document.getElementById('percentTracker');
    currentTotalPercent = parseFloat(currentTotalPercent.toFixed(2));
    
    if (currentTotalPercent === 100) {
        tracker.innerText = `✅ 配方總比例：100.00% (完美)`; tracker.className = 'percent-tracker match';
    } else if (currentTotalPercent > 100) {
        tracker.innerText = `⚠️ 配方總比例：${currentTotalPercent}% (超出 ${(currentTotalPercent - 100).toFixed(2)}%)`; tracker.className = 'percent-tracker error';
    } else {
        tracker.innerText = `📉 配方總比例：${currentTotalPercent}% (不足 ${(100 - currentTotalPercent).toFixed(2)}%)`; tracker.className = 'percent-tracker error'; tracker.style.color = '#e67e22'; 
    }

    let warningHtml = currentTotalPercent !== 100 ? `<br><strong style="color:red;">【注意】當前配方比例未達 100%，建議調配前先確認比例！</strong>` : '';
    let herbMsg = herbOilsNames.length > 0 ? `系統已自動補償 <strong>${lossWeight.toFixed(2)}g</strong> 的藥材損耗至 <strong>${herbOilsNames.join('、')}</strong>。` : `目前無計算損耗補償。`;

    document.getElementById('summary').innerHTML = `
        <strong>📋 實驗室計算摘要 (更新時間：${new Date().toLocaleString('zh-TW')})：</strong><br>
        預計製作 <strong>${totalW}g</strong> 的成品。投入藥材 <strong>${herbW}g</strong> (吸附比 ${rate})。<br>
        ${herbMsg} ${warningHtml}
    `;
}

// ================= AI 顧問整合功能 (Gemini API) =================
function openAIAdvisor() {
    document.getElementById('aiModal').style.display = 'flex';
    
    // 檢查是否已有 API Key
    let apiKey = localStorage.getItem('gemini_api_key');
    if (!apiKey) {
        apiKey = prompt("🤖 歡迎使用 AI 配方顧問！\n\n為了進行分析，請輸入您的 Google Gemini API Key (可於 Google AI Studio 免費獲取)：");
        if (apiKey && apiKey.trim() !== '') {
            localStorage.setItem('gemini_api_key', apiKey.trim());
        } else {
            document.getElementById('aiModal').style.display = 'none';
            alert("需要 API Key 才能呼叫 AI 分析。您可隨時再次點擊按鈕重試。");
            return;
        }
    }
    
    fetchGeminiAnalysis(apiKey);
}

function closeAIAdvisor() {
    document.getElementById('aiModal').style.display = 'none';
    // 恢復載入中畫面以便下次使用
    document.getElementById('aiResultBody').innerHTML = `
        <div class="ai-loading">
            <div class="ai-spinner"></div>
            <div>正在將配方傳送至 Gemini AI 進行深度化學分析...</div>
        </div>`;
}

async function fetchGeminiAnalysis(apiKey) {
    const targetType = document.getElementById('presetType').options[document.getElementById('presetType').selectedIndex].text;
    
    // 將當前配方轉換為文字清單
    const formulaStr = currentFormula.map(item => `- ${item.name}: ${item.percent}%`).join('\n');
    const warningStr = currentTotalPercent !== 100 ? `(請注意：此配方目前總和為 ${currentTotalPercent}%，尚未達到100%，請一併給出比例修正建議)` : '';

    // 建立給 AI 的專業 Prompt 提示詞
    const promptText = `
你現在是一位擁有20年資歷的「頂級化妝品研發顧問兼配方化學家」。
我正在實驗室研發一款面霜，預設的訴求為：【${targetType}】。

以下是我目前的配方表 ${warningStr}：
${formulaStr}

請以「化妝品配方師」的嚴謹角度，為我提供專業分析報告。請務必包含以下四個段落，並使用繁體中文回覆：

1. **配方結構評估**：分析水相、油相、乳化劑的比例結構是否合理？是否能形成穩定的乳化體系？
2. **膚感與功效預測**：依據此比例，預測塗抹時的延展性、吸收度與膚感。是否真的符合「${targetType}」的訴求？
3. **穩定性與防腐風險**：目前的組合是否有潛在的分層、破乳風險？防腐系統(如苯氧乙醇等)與抗氧化(維他命E)比例是否足夠安全？
4. **專家具體優化建議**：如果由你操刀，為了讓配方更完美，請「具體給出」你建議增加、減少哪些原料的%數？或者建議替換什麼原料？
`;

    try {
        // 呼叫 Gemini 1.5 Flash API (速度快、效果極佳)
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: promptText }] }]
            })
        });

        if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error?.message || "API 請求失敗");
        }

        const data = await response.json();
        const aiResponseText = data.candidates[0].content.parts[0].text;
        
        // 將 AI 回傳的 Markdown 轉換為簡單的 HTML 以利閱讀
        document.getElementById('aiResultBody').innerHTML = parseMarkdownToHTML(aiResponseText) + 
            `<br><br><div style="text-align:right;"><button class="btn-action btn-qs" onclick="localStorage.removeItem('gemini_api_key'); alert('API Key 已清除，下次請重新輸入。'); closeAIAdvisor();" style="display:inline-block; font-size:12px; padding:6px;">更換/清除 API Key</button></div>`;

    } catch (error) {
        document.getElementById('aiResultBody').innerHTML = `
            <div style="color:var(--danger); padding: 20px;">
                <strong>❌ 分析失敗：</strong><br><br>${error.message}<br><br>
                <small>請確認您的網路連線，或檢查您的 API Key 是否正確及有效。您可以點擊下方按鈕重設 Key。</small><br><br>
                <button class="btn-action" onclick="localStorage.removeItem('gemini_api_key'); closeAIAdvisor(); openAIAdvisor();">重新輸入 API Key</button>
            </div>
        `;
    }
}

// 簡易 Markdown 轉 HTML 處理器 (針對 AI 回覆)
function parseMarkdownToHTML(text) {
    let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); // 粗體
    html = html.replace(/\*(.*?)\*/g, '<em>$1</em>'); // 斜體
    html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>'); // H3標題
    html = html.replace(/^## (.*$)/gim, '<h3>$1</h3>'); // 將 H2 也轉為 H3 大小以符合面板
    html = html.replace(/^\* (.*$)/gim, '<ul><li>$1</li></ul>'); // 項目符號
    html = html.replace(/<\/ul>\n<ul>/gim, ''); // 合併相鄰的 ul
    html = html.replace(/\n/g, '<br>'); // 換行
    return html;
}

// ================= 匯出報表功能 (已包含防裁切機制) =================
async function exportReport(format) {
    const container = document.getElementById('reportContainer');
    document.body.classList.add('exporting');
    
    const inputs = container.querySelectorAll('input:not([type="checkbox"]), select');
    const tempSpans = [];

    inputs.forEach(input => {
        const span = document.createElement('span');
        span.style.fontWeight = 'bold'; span.style.color = '#333'; span.style.display = 'inline-block'; span.style.width = '100%'; span.style.textAlign = window.getComputedStyle(input).textAlign; span.style.lineHeight = '2'; span.style.padding = '5px 0';
        if (input.tagName.toLowerCase() === 'select') { span.innerText = input.options[input.selectedIndex].text; } else { span.innerText = input.value; }
        input.style.display = 'none';
        input.parentNode.insertBefore(span, input);
        tempSpans.push({ input: input, span: span });
    });

    await new Promise(resolve => setTimeout(resolve, 300));

    try {
        const canvas = await html2canvas(container, { scale: 2, useCORS: true, backgroundColor: "#ffffff", logging: false });
        const imgData = canvas.toDataURL('image/jpeg', 1.0);
        const fileName = `面霜配方定稿_${new Date().toISOString().replace(/[:.]/g, '').substring(0, 15)}`;

        if (format === 'jpg') {
            const link = document.createElement('a'); link.download = `${fileName}.jpg`; link.href = imgData; link.click();
        } else if (format === 'pdf') {
            const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth() - 20; const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            pdf.addImage(imgData, 'JPEG', 10, 10, pdfWidth, pdfHeight); pdf.save(`${fileName}.pdf`);
        }
    } catch (err) { alert("匯出失敗：" + err); } finally {
        tempSpans.forEach(item => { item.input.style.display = ''; item.span.remove(); });
        document.body.classList.remove('exporting');
    }
}
</script>
